<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Prosty Klient TTP</title>
    <style>
        /* Prosty styl dla naszej konsoli logów */
        #konsola {
            height: 250px;
            overflow-y: auto;
            background-color: #1e1e1e;
            color: #00ff00;
            font-family: monospace;
            padding: 10px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }
        .log-error { color: #ff5555; }
        .log-success { color: #55ff55; font-weight: bold; }
        .log-info { color: #cccccc; }
    </style>
</head>
<body>

    <h1>Klient Wymiany Danych</h1>
    
    <h3>Przebieg operacji:</h3>
    <div id="konsola">
        <div class="log-info">[SYSTEM] Węzeł w trybie offline. Wymagana rejestracja TTP.</div>
    </div>

    <div id="sekcjaRejestracji">
        <hr>
        <h3>Faza A: Inicjalizacja</h3>
        <p>Aplikacja jest uruchomiona, ale musi połączyć się z TTP, aby pobrać Root CA i wygenerować certyfikat X.509.</p>
        <button id="btnRejestruj" onclick="rejestrujWTTP()">Połącz i Zarejestruj (TTP)</button>
    </div>

    <div id="sekcjaPlikow" style="display: none;">
        <hr>
        <h2>Dostępne pliki na serwerze:</h2>
        <ul id="fileList">
            <li>Pobieranie listy...</li>
        </ul>
    </div>

    <script>
        // Funkcja pomocnicza do dodawania nowych linijek do historii
        function dodajLog(wiadomosc, typ = "info") {
            const konsola = document.getElementById('konsola');
            const nowaLinia = document.createElement('div');
            
            // Pobranie aktualnego czasu (GG:MM:SS)
            const czas = new Date().toLocaleTimeString();
            
            nowaLinia.innerText = `[${czas}] ${wiadomosc}`;
            
            // Kolorowanie w zależności od typu wiadomości
            if (typ === "error") nowaLinia.className = "log-error";
            else if (typ === "success") nowaLinia.className = "log-success";
            else nowaLinia.className = "log-info";

            konsola.appendChild(nowaLinia);
            
            // Automatyczne przewijanie na sam dół
            konsola.scrollTop = konsola.scrollHeight;
        }

        function rejestrujWTTP() {
            const btn = document.getElementById('btnRejestruj');
            
            dodajLog("Trwa łączenie z TTP i kryptograficzna wymiana kluczy...", "info");
            btn.disabled = true;

            fetch('/api/register', { method: 'POST' })
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(err => { throw new Error(err) });
                    }
                    return response.json();
                })
                .then(data => {
                    dodajLog("SUKCES! Węzeł autoryzowany. Certyfikat pobrany.", "success");
                    document.getElementById('sekcjaRejestracji').style.display = 'none';
                    document.getElementById('sekcjaPlikow').style.display = 'block';
                    pobierzListePlikow(); 
                })
                .catch(err => {
                    dodajLog("BŁĄD: " + err.message, "error");
                    btn.disabled = false;
                });
        }

        function pobierzListePlikow() {
            dodajLog("Pobieranie listy plików z serwera...", "info");
            fetch('/api/files')
                .then(response => response.json())
                .then(files => {
                    const list = document.getElementById('fileList');
                    list.innerHTML = ''; 
                    
                    if (files.length === 0) {
                        list.innerHTML = '<li>Brak plików na serwerze.</li>';
                        dodajLog("Otrzymano pustą listę plików.", "info");
                        return;
                    }

                    files.forEach(file => {
                        const li = document.createElement('li');
                        li.innerHTML = file + ' <button onclick="pobierzPlik(\'' + file + '\')">Pobierz</button>';
                        list.appendChild(li);
                    });
                    dodajLog(`Załadowano listę plików (${files.length} szt.).`, "success");
                })
                .catch(err => {
                    dodajLog("Błąd komunikacji z Serwerem Plików.", "error");
                });
        }

        function pobierzPlik(nazwaPliku) {
            dodajLog(`INICJALIZACJA TRANSFERU: ${nazwaPliku} (Faza B i C)...`, "info");

            fetch('/api/download?file=' + encodeURIComponent(nazwaPliku))
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(err => { throw new Error(err) });
                    }
                    return response.json();
                })
                .then(data => {
                    dodajLog(`SUKCES! Plik zdeszyfrowano i zapisano jako: ${data.path}`, "success");
                })
                .catch(err => {
                    dodajLog(`ODRZUCONO: ${err.message}`, "error");
                });
        }
    </script>

</body>
</html>
